<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Kashmir Now</title>

<style>
body {margin:0;font-family: 'Segoe UI', sans-serif;background:#f5f5f5;}

nav {
position:sticky;top:0;background:#0b5d7a;color:white;
display:flex;justify-content:space-between;padding:15px;
}
nav a {color:white;margin:0 10px;text-decoration:none;}

.hero {
background:url('https://images.unsplash.com/photo-1593691509543-c55fb32c8c5b') center/cover;
height:90vh;color:white;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
}

.booking-box {
background:white;padding:20px;border-radius:10px;margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input, textarea {
padding:10px;margin:5px;border:1px solid #ccc;border-radius:5px;width:90%;
}

.btn {
background:#ff9800;color:white;border:none;padding:10px 20px;
border-radius:5px;cursor:pointer;
}

section {padding:40px 20px;text-align:center;}

.cards {
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
gap:20px;
}

.card {
background:white;padding:15px;border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.price {color:green;font-weight:bold;}

.whatsapp {
position:fixed;bottom:20px;right:20px;background:#25D366;
color:white;padding:15px;border-radius:50%;
}
</style>
</head>

<body>

<nav>
<h3>Travel Kashmir Now</h3>
<div>
<a href="#">Home</a>
<a href="#">Packages</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="hero">
<h1>Book Your Kashmir Trip</h1>
<p>Best Deals | Hotels | Cab Service</p>

<div class="booking-box">
<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="text" id="package" placeholder="Package Name">
<br>
<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</div>
</div>

<section>
<h2>Tour Packages</h2>
<div class="cards">

<div class="card">
<h3>Srinagar Tour</h3>
<p>2 Nights / 3 Days</p>
<p class="price">₹7,999</p>
</div>

<div class="card">
<h3>Gulmarg Tour</h3>
<p>3 Nights / 4 Days</p>
<p class="price">₹10,999</p>
</div>

<div class="card">
<h3>Pahalgam Tour</h3>
<p>3 Nights / 4 Days</p>
<p class="price">₹9,999</p>
</div>

</div>
</section>

<section>
<h2>Contact</h2>
<p>📞 8899434467</p>
<p>📍 Srinagar, Jammu & Kashmir</p>
</section>

<a class="whatsapp" href="https://wa.me/918899434467">💬</a>

<script>
function sendWhatsApp(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let package = document.getElementById("package").value;

let message = "New Booking:%0AName: " + name + "%0APhone: " + phone + "%0APackage: " + package;

window.open("https://wa.me/918899434467?text=" + message);
}
</script>

</body>
</html>
